<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confirma tu signup</title>
  </head>
  <body style="margin:0;padding:0;background:#0b0b0f;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#e7e7ea;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#0b0b0f;padding:40px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:24px;padding:32px;">
            <tr>
              <td>
                <h1 style="margin:0 0 8px;font-size:28px;font-weight:800;background:linear-gradient(135deg,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;color:#a78bfa;">
                  Confirma tu signup
                </h1>
                <p style="margin:0 0 24px;font-size:14px;color:#a1a1aa;">
                  Dale click al link para confirmar tu mail y empezar.
                </p>

                <table role="presentation" cellpadding="0" cellspacing="0" style="margin:8px 0 24px;">
                  <tr>
                    <td style="border-radius:12px;background:linear-gradient(135deg,#a78bfa,#f472b6);">
                      <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:14px 24px;font-size:15px;font-weight:600;color:#0b0b0f;text-decoration:none;border-radius:12px;">
                        Confirmar mi mail
                      </a>
                    </td>
                  </tr>
                </table>

                <p style="margin:0 0 8px;font-size:12px;color:#a1a1aa;">
                  Si el botón no anda, copiá y pegá este link:
                </p>
                <p style="margin:0 0 24px;font-size:12px;color:#e7e7ea;word-break:break-all;">
                  <a href="{{ .ConfirmationURL }}" style="color:#a78bfa;text-decoration:underline;">{{ .ConfirmationURL }}</a>
                </p>

                <hr style="border:none;border-top:1px solid rgba(255,255,255,0.08);margin:24px 0;" />
                <p style="margin:0;font-size:11px;color:#71717a;">
                  Si no fuiste vos, ignorá este mail.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
