<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Awakenings Festival 2026 — Set Times</title>
<style>
  :root {
    --bg: #0e0710;
    --bg-2: #1a0e1f;
    --card: #1f1326;
    --card-hover: #2a1934;
    --accent: #ff2d75;
    --accent-2: #ffd84a;
    --text: #f4ecf7;
    --muted: #b39bbe;
    --fav: #ffd84a;
    --border: rgba(255,255,255,0.08);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: radial-gradient(ellipse at top, #2a0a2e 0%, var(--bg) 60%);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
  }
  header {
    text-align: center;
    margin-bottom: 24px;
  }
  h1 {
    margin: 0 0 6px;
    font-size: 2rem;
    letter-spacing: 1px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .subtitle { color: var(--muted); font-size: 0.95rem; }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin: 18px 0 24px;
  }
  .controls input, .controls button, .controls select {
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 9px 14px;
    border-radius: 999px;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .controls input { min-width: 220px; cursor: text; }
  .controls input:focus { outline: none; border-color: var(--accent); }
  .controls button:hover, .controls select:hover { border-color: var(--accent); }
  .controls button.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .day-tabs {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .day-tab {
    padding: 10px 22px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 999px;
    cursor: pointer;
    font-weight: 600;
    letter-spacing: 1px;
    transition: all 0.2s;
    color: var(--muted);
  }
  .day-tab.active {
    background: linear-gradient(90deg, var(--accent), #ff6e3d);
    color: #fff;
    border-color: transparent;
    box-shadow: 0 6px 20px rgba(255,45,117,0.3);
  }

  .areas-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: 18px;
    max-width: 1300px;
    margin: 0 auto;
  }
  .area {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
  }
  .area h2 {
    margin: 0 0 12px;
    font-size: 1rem;
    letter-spacing: 2px;
    color: var(--accent-2);
    background: rgba(255,216,74,0.12);
    display: inline-block;
    padding: 5px 10px;
    border-radius: 6px;
  }
  .slot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 10px;
    border-radius: 8px;
    background: var(--card);
    margin-bottom: 8px;
    transition: background 0.15s;
  }
  .slot:hover { background: var(--card-hover); }
  .slot-info { flex: 1; min-width: 0; }
  .slot-time {
    font-size: 0.78rem;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.5px;
  }
  .slot-name {
    font-weight: 600;
    font-size: 0.95rem;
    margin-top: 2px;
    word-break: break-word;
  }
  .fav-btn {
    background: transparent;
    border: none;
    cursor: pointer;
    font-size: 1.4rem;
    line-height: 1;
    padding: 4px;
    color: var(--muted);
    transition: transform 0.15s, color 0.15s;
  }
  .fav-btn:hover { transform: scale(1.2); }
  .fav-btn.faved { color: var(--fav); text-shadow: 0 0 12px rgba(255,216,74,0.6); }

  .empty {
    text-align: center;
    color: var(--muted);
    padding: 40px;
    grid-column: 1 / -1;
  }

  .summary {
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 14px;
  }
  .summary b { color: var(--fav); }
</style>

const STORAGE_KEY = "awakenings_2026_favs";
let favs = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"));
let activeDay = "FRIDAY";
let favOnly = false;
let searchQuery = "";

function saveFavs() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...favs]));
}

function toggleFav(name) {
  if (favs.has(name)) favs.delete(name);
  else favs.add(name);
  saveFavs();
  render();
}

function render() {
  // Day tabs
  const tabsEl = document.getElementById("dayTabs");
  tabsEl.innerHTML = "";
  Object.keys(data).forEach(day => {
    const btn = document.createElement("button");
    btn.className = "day-tab" + (day === activeDay ? " active" : "");
    btn.textContent = day;
    btn.onclick = () => { activeDay = day; render(); };
    tabsEl.appendChild(btn);
  });

  // Areas
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  const areas = data[activeDay];
  let total = 0, shown = 0;
  const q = searchQuery.toLowerCase().trim();

  Object.entries(areas).forEach(([area, slots]) => {
    const filtered = slots.filter(([t, n]) => {
      total++;
      if (favOnly && !favs.has(n)) return false;
      if (q && !n.toLowerCase().includes(q)) return false;
      shown++;
      return true;
    });
    if (filtered.length === 0) return;
    const card = document.createElement("div");
    card.className = "area";
    card.innerHTML = `<h2>${area}</h2>`;
    filtered.forEach(([time, name]) => {
      const slot = document.createElement("div");
      slot.className = "slot";
      const isFav = favs.has(name);
      slot.innerHTML = `
        <div class="slot-info">
          <div class="slot-time">${time}</div>
          <div class="slot-name">${name}</div>
        </div>
        <button class="fav-btn ${isFav ? "faved" : ""}" title="${isFav ? "Remove from favorites" : "Add to favorites"}">${isFav ? "★" : "☆"}</button>
      `;
      slot.querySelector(".fav-btn").onclick = () => toggleFav(name);
      card.appendChild(slot);
    });
    grid.appendChild(card);
  });

  if (shown === 0) {
    grid.innerHTML = `<div class="empty">No sets match your filters on ${activeDay}.</div>`;
  }

  // Summary
  document.getElementById("summary").innerHTML =
    `Showing <b>${shown}</b> of ${total} sets · <b>${favs.size}</b> favorites total`;

  // Buttons
  const favBtn = document.getElementById("favOnly");
  favBtn.classList.toggle("active", favOnly);
  favBtn.textContent = favOnly ? "★ Favorites Only ✓" : "★ Favorites Only";
}

document.getElementById("search").addEventListener("input", e => {
  searchQuery = e.target.value;
  render();
});
document.getElementById("favOnly").addEventListener("click", () => {
  favOnly = !favOnly; render();
});
document.getElementById("clearFavs").addEventListener("click", () => {
  if (favs.size && confirm("Clear all favorites?")) {
    favs.clear(); saveFavs(); render();
  }
});

render();
</script>
